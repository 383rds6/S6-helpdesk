<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S6 Admin — Ticket Queue</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #1c2947;
    --border: #2a3a5c;
    --accent: #c0392b;
    --accent-dim: rgba(192,57,43,0.12);
    --accent-glow: rgba(192,57,43,0.35);
    --blue: #2c5fa8;
    --text: #f0f0f0;
    --muted: #8a9bb5;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --p-low: #27ae60;
    --p-medium: #f39c12;
    --p-high: #e67e22;
    --p-critical: #c0392b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(192,57,43,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(44,95,168,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── LOGIN OVERLAY ── */
  #loginOverlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    padding: 20px;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 36px;
    width: 100%; max-width: 400px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--blue), transparent);
  }

  .login-logo-row {
    display: flex; justify-content: center; gap: 24px;
    margin-bottom: 20px;
  }

  .login-logo {
    width: 52px; height: 52px;
    object-fit: contain;
    mix-blend-mode: screen;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }

  .login-title {
    font-family: var(--mono);
    font-size: 18px; font-weight: 600;
    text-align: center;
    margin-bottom: 4px;
  }

  .login-sub {
    font-size: 12px; color: var(--muted);
    text-align: center; margin-bottom: 28px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .login-field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }

  .login-field label {
    font-size: 11px; font-weight: 500;
    color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase;
  }

  .login-field input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  .login-field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .login-btn {
    width: 100%;
    background: var(--accent);
    border: none; border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-family: var(--mono); font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 12px;
    margin-top: 8px;
    transition: background 0.2s, box-shadow 0.2s;
  }

  .login-btn:hover {
    background: #a93226;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .login-error {
    font-size: 12px; color: var(--accent);
    text-align: center; margin-top: 12px;
    font-family: var(--mono);
    min-height: 18px;
  }

  .login-back {
    display: block; text-align: center;
    font-size: 12px; color: var(--muted);
    font-family: var(--mono);
    margin-top: 16px;
    text-decoration: none;
    transition: color 0.2s;
  }

  .login-back:hover { color: var(--text); }

  /* ── MAIN APP ── */
  #app { display: none; min-height: 100vh; position: relative; z-index: 1; }

  /* Topbar */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
    position: sticky; top: 0; z-index: 100;
  }

  .topbar-left {
    display: flex; align-items: center; gap: 16px;
  }

  .tb-logos { display: flex; gap: 10px; align-items: center; }

  .tb-logo {
    width: 36px; height: 36px;
    object-fit: contain;
    mix-blend-mode: screen;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5));
  }

  .tb-title {
    font-family: var(--mono);
    font-size: 15px; font-weight: 600;
    letter-spacing: -0.01em;
  }

  .tb-title span { color: var(--accent); }

  .topbar-right { display: flex; align-items: center; gap: 16px; }

  .logout-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 6px 14px;
    transition: border-color 0.2s, color 0.2s;
  }

  .logout-btn:hover { border-color: var(--text); color: var(--text); }

  .ticket-count {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
  }

  .ticket-count strong { color: var(--text); }

  /* Main content */
  .main {
    padding: 32px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Toolbar */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
  }

  .toolbar-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .section-badge {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(192,57,43,0.25);
    padding: 4px 10px; border-radius: 4px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--mono); font-size: 11px;
    padding: 5px 12px;
    transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent); color: var(--text);
    background: var(--accent-dim);
  }

  .sort-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--mono); font-size: 11px;
    padding: 5px 12px;
    transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  .sort-btn:hover { border-color: var(--blue); color: var(--text); }

  .clear-completed-btn {
    background: transparent;
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: 5px;
    color: var(--accent);
    cursor: pointer;
    font-family: var(--mono); font-size: 11px;
    padding: 5px 12px;
    transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  .clear-completed-btn:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state h3 { font-family: var(--mono); font-size: 16px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* Ticket list */
  #ticketList {
    display: flex; flex-direction: column; gap: 10px;
  }

  /* Ticket card */
  .ticket-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0;
    position: relative;
    transition: box-shadow 0.2s, border-color 0.2s, opacity 0.2s;
    cursor: default;
    overflow: hidden;
  }

  .ticket-card.dragging {
    opacity: 0.5;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .ticket-card.drag-over {
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(44,95,168,0.3);
  }

  .ticket-card.completed {
    opacity: 0.45;
  }

  .ticket-card.completed .ticket-subject {
    text-decoration: line-through;
    color: var(--muted);
  }

  /* Priority stripe */
  .priority-stripe {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }

  .p-low .priority-stripe { background: var(--p-low); }
  .p-medium .priority-stripe { background: var(--p-medium); }
  .p-high .priority-stripe { background: var(--p-high); }
  .p-critical .priority-stripe { background: var(--p-critical); }

  .ticket-inner {
    padding: 16px 16px 16px 20px;
    display: flex; align-items: flex-start; gap: 14px;
  }

  /* Drag handle */
  .drag-handle {
    color: var(--border);
    cursor: grab;
    font-size: 16px;
    padding-top: 2px;
    flex-shrink: 0;
    transition: color 0.15s;
    user-select: none;
    line-height: 1;
  }

  .drag-handle:hover { color: var(--muted); }
  .drag-handle:active { cursor: grabbing; }

  /* Checkbox */
  .ticket-check {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
    transition: border-color 0.15s, background 0.15s;
  }

  .ticket-check:hover { border-color: var(--p-low); }
  .ticket-check.checked { background: var(--p-low); border-color: var(--p-low); }
  .ticket-check.checked::after {
    content: '✓';
    color: #fff;
    font-size: 12px;
    font-weight: 700;
  }

  /* Ticket body */
  .ticket-body { flex: 1; min-width: 0; }

  .ticket-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 12px; flex-wrap: wrap; margin-bottom: 6px;
  }

  .ticket-subject {
    font-size: 15px; font-weight: 600;
    line-height: 1.3; transition: color 0.2s;
  }

  .ticket-meta {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    flex-shrink: 0;
  }

  .ticket-id-badge {
    font-family: var(--mono); font-size: 10px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 3px;
    letter-spacing: 0.06em;
  }

  .priority-badge {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  .p-low .priority-badge { color: var(--p-low); background: rgba(39,174,96,0.12); border: 1px solid rgba(39,174,96,0.25); }
  .p-medium .priority-badge { color: var(--p-medium); background: rgba(243,156,18,0.12); border: 1px solid rgba(243,156,18,0.25); }
  .p-high .priority-badge { color: var(--p-high); background: rgba(230,126,34,0.12); border: 1px solid rgba(230,126,34,0.25); }
  .p-critical .priority-badge { color: var(--p-critical); background: rgba(192,57,43,0.12); border: 1px solid rgba(192,57,43,0.25); }

  .ticket-info-row {
    font-size: 12px; color: var(--muted);
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .ticket-info-row span { display: flex; align-items: center; gap: 4px; }

  .ticket-description-preview {
    font-size: 13px; color: #7a8fa8;
    line-height: 1.5;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 600px;
  }

  /* Expand / collapse */
  .ticket-expand-btn {
    background: transparent; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 11px; font-family: var(--mono);
    padding: 0; transition: color 0.15s;
    flex-shrink: 0; margin-top: 4px;
    text-transform: uppercase; letter-spacing: 0.06em;
  }

  .ticket-expand-btn:hover { color: var(--text); }

  .ticket-expanded {
    display: none;
    padding: 12px 16px 16px 56px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.15);
  }

  .ticket-expanded.open { display: block; }

  .exp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px 24px;
    margin-bottom: 12px;
  }

  .exp-field label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted);
    font-family: var(--mono); margin-bottom: 3px;
    display: block;
  }

  .exp-field p {
    font-size: 13px; color: var(--text);
    font-family: var(--mono);
  }

  .exp-desc {
    font-size: 13px; color: #a0b0c8;
    line-height: 1.6;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-top: 4px;
    white-space: pre-wrap;
  }

  /* Priority editor in expanded */
  .priority-editor {
    display: flex; align-items: center; gap: 8px;
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .priority-editor label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted);
    font-family: var(--mono);
  }

  .priority-editor select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono); font-size: 12px;
    padding: 5px 10px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .priority-editor select:focus { border-color: var(--accent); }

  .delete-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: 5px;
    color: var(--accent);
    cursor: pointer;
    font-family: var(--mono); font-size: 11px;
    padding: 5px 12px;
    transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  .delete-btn:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px;
    display: flex; flex-direction: column; gap: 2px;
    min-width: 100px;
  }

  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-family: var(--mono); }
  .stat-value { font-size: 22px; font-weight: 600; font-family: var(--mono); }
  .stat-value.red { color: var(--accent); }
  .stat-value.orange { color: var(--p-high); }
  .stat-value.yellow { color: var(--p-medium); }
  .stat-value.green { color: var(--p-low); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Completed banner */
  .completed-ts {
    font-size: 10px; font-family: var(--mono);
    color: var(--p-low); margin-top: 4px;
  }

  @media (max-width: 600px) {
    .main { padding: 16px; }
    .topbar { padding: 0 16px; }
    .ticket-info-row { gap: 8px; }
  }
</style>
</head>

<script>
// ── CREDENTIALS ──────────────────────────────────────────────
// To add/change users, edit this object: username: 'password'
const USERS = {
  's6admin':   's6@383rd',
  'commander': 'cmd@383rd',
  'nco':       'nco@383rd'
};

// ── AUTH ─────────────────────────────────────────────────────
function isLoggedIn() { return sessionStorage.getItem('s6_auth') === 'true'; }

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('loginUser').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('loginPass').focus(); });

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err  = document.getElementById('loginError');
  if (USERS[user] && USERS[user] === pass) {
    sessionStorage.setItem('s6_auth', 'true');
    sessionStorage.setItem('s6_user', user);
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderAll();
  } else {
    err.textContent = 'Invalid credentials. Access denied.';
    document.getElementById('loginPass').value = '';
    setTimeout(() => err.textContent = '', 3000);
  }
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('s6_auth');
  sessionStorage.removeItem('s6_user');
  location.reload();
});

if (isLoggedIn()) {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ── JSONBin Configuration ─────────────────────────────────────
// Must match the values in index.html
const JSONBIN_ID  = '69c70ae2c3097a1dd569f663';
const JSONBIN_KEY = '$2a$10$rmrHPFv6HbvbBgjI0Wv0N.M4GqG1VbqRt3DUZzYCXZCHSLumXHsZC';

// ── STORAGE (JSONBin — shared across all devices) ──────────────
async function getTickets() {
  try {
    const res = await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_ID + '/latest', {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    if (!res.ok) return [];
    const data = await res.json();
    return data.record.tickets || [];
  } catch(e) { return []; }
}

async function saveTickets(tickets) {
  try {
    await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_ID, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_KEY
      },
      body: JSON.stringify({ tickets: tickets })
    });
  } catch(e) { console.error('Save error:', e); }
}

// ── STATE ─────────────────────────────────────────────────────
let currentFilter = 'open';
let dragSrcId = null;

// ── RENDER ────────────────────────────────────────────────────
async function renderAll() {
  if (!isLoggedIn()) return;
  const tickets = await getTickets();
  // Default sort: by priority (set from rank at submission), then by date within same priority
  // Admin can override with drag-to-reorder or sort buttons
  tickets.sort((a, b) => {
    const pa = PRIORITY_ORDER[a.priority] ?? 4;
    const pb = PRIORITY_ORDER[b.priority] ?? 4;
    if (pa !== pb) return pa - pb;
    // Same priority → sort by submission time (oldest first)
    return new Date(a.timestamp) - new Date(b.timestamp);
  });
  renderStats(tickets);
  renderList(tickets);
  updateCountLabel(tickets);
}

function updateCountLabel(tickets) {
  const open = tickets.filter(t => t.status === 'open').length;
  document.getElementById('ticketCountLabel').innerHTML = `<strong>${open}</strong> open`;
}

function renderStats(tickets) {
  const open = tickets.filter(t => t.status === 'open');
  document.getElementById('statTotal').textContent    = open.length;
  document.getElementById('statCritical').textContent = open.filter(t => t.priority === 'critical').length;
  document.getElementById('statHigh').textContent     = open.filter(t => t.priority === 'high').length;
  document.getElementById('statMedium').textContent   = open.filter(t => t.priority === 'medium').length;
  document.getElementById('statLow').textContent      = open.filter(t => (t.priority === 'low' || !t.priority)).length;
  document.getElementById('statDone').textContent     = tickets.filter(t => t.status === 'completed').length;
}

const PRIORITY_ORDER = { critical: 0, high: 1, medium: 2, low: 3, undefined: 4 };

function renderList(tickets) {
  const list = document.getElementById('ticketList');
  list.innerHTML = '';

  let filtered = tickets.filter(t => {
    if (currentFilter === 'open')      return t.status === 'open';
    if (currentFilter === 'completed') return t.status === 'completed';
    return true;
  });

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="icon">📋</div>
      <h3>No tickets here</h3>
      <p>${currentFilter === 'open' ? 'No open tickets. All clear!' :
           currentFilter === 'completed' ? 'No completed tickets yet.' :
           'No tickets submitted yet.'}</p>
    </div>`;
    return;
  }

  filtered.forEach(ticket => {
    list.appendChild(buildCard(ticket));
  });
}

function priorityLabel(p) {
  if (!p) return 'Low';
  return p.charAt(0).toUpperCase() + p.slice(1);
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
         ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function buildCard(ticket) {
  const p = ticket.priority || 'low';
  const isCompleted = ticket.status === 'completed';

  const card = document.createElement('div');
  card.className = `ticket-card p-${p}${isCompleted ? ' completed' : ''}`;
  card.dataset.id = ticket.id;
  card.draggable = !isCompleted;
  card.setAttribute('data-order', ticket.order || 0);

  card.innerHTML = `
    <div class="priority-stripe"></div>
    <div class="ticket-inner">
      <div class="drag-handle" title="Drag to reorder">⠿</div>
      <div class="ticket-check${isCompleted ? ' checked' : ''}" data-id="${ticket.id}" title="Mark complete"></div>
      <div class="ticket-body">
        <div class="ticket-header">
          <div class="ticket-subject">${escHtml(ticket.subject)}</div>
          <div class="ticket-meta">
            <span class="ticket-id-badge">${ticket.id}</span>
            <span class="priority-badge">${priorityLabel(p)}</span>
            <button class="ticket-expand-btn" data-id="${ticket.id}">Details ▾</button>
          </div>
        </div>
        <div class="ticket-info-row">
          <span>👤 ${escHtml(ticket.firstName)} ${escHtml(ticket.lastName)}</span>
          <span>🏢 ${escHtml(ticket.department)}</span>
          <span>🖥️ ${escHtml(ticket.serial)}</span>
          <span>🕐 ${formatDate(ticket.timestamp)}</span>
        </div>
        <div class="ticket-description-preview">${escHtml(ticket.description)}</div>
        ${isCompleted && ticket.completedAt ? `<div class="completed-ts">✓ Completed ${formatDate(ticket.completedAt)}</div>` : ''}
      </div>
    </div>
    <div class="ticket-expanded" id="exp-${ticket.id}">
      <div class="exp-grid">
        <div class="exp-field"><label>Email</label><p>${escHtml(ticket.email)}</p></div>
        <div class="exp-field"><label>Phone</label><p>${escHtml(ticket.phone || '—')}</p></div>
        <div class="exp-field"><label>Category</label><p>${escHtml(ticket.issueType)}</p></div>
        <div class="exp-field"><label>Serial #</label><p>${escHtml(ticket.serial)}</p></div>
      </div>
      <div class="exp-desc">${escHtml(ticket.description)}</div>
      <div class="priority-editor">
        <label>Priority:</label>
        <select data-id="${ticket.id}" class="priority-select">
          <option value="low"      ${p==='low'?'selected':''}>Low</option>
          <option value="medium"   ${p==='medium'?'selected':''}>Medium</option>
          <option value="high"     ${p==='high'?'selected':''}>High</option>
          <option value="critical" ${p==='critical'?'selected':''}>Critical</option>
        </select>
        <button class="delete-btn" data-id="${ticket.id}">🗑 Delete</button>
      </div>
    </div>
  `;

  // Checkbox
  card.querySelector('.ticket-check').addEventListener('click', e => {
    toggleComplete(e.currentTarget.dataset.id);
  });

  // Expand/collapse
  card.querySelector('.ticket-expand-btn').addEventListener('click', e => {
    const id = e.currentTarget.dataset.id;
    const panel = document.getElementById('exp-' + id);
    panel.classList.toggle('open');
    e.currentTarget.textContent = panel.classList.contains('open') ? 'Details ▴' : 'Details ▾';
  });

  // Priority change
  card.querySelector('.priority-select').addEventListener('change', e => {
    changePriority(e.target.dataset.id, e.target.value);
  });

  // Delete
  card.querySelector('.delete-btn').addEventListener('click', e => {
    if (confirm('Delete this ticket permanently?')) deleteTicket(e.currentTarget.dataset.id);
  });

  // Drag events
  card.addEventListener('dragstart', e => {
    dragSrcId = ticket.id;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.ticket-card').forEach(c => c.classList.remove('drag-over'));
  });
  card.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.ticket-card').forEach(c => c.classList.remove('drag-over'));
    if (ticket.id !== dragSrcId) card.classList.add('drag-over');
  });
  card.addEventListener('drop', e => {
    e.preventDefault();
    if (dragSrcId && dragSrcId !== ticket.id) reorder(dragSrcId, ticket.id);
    card.classList.remove('drag-over');
  });

  return card;
}

// ── ACTIONS ───────────────────────────────────────────────────
async function toggleComplete(id) {
  const tickets = await getTickets();
  const t = tickets.find(x => x.id === id);
  if (!t) return;
  if (t.status === 'open') {
    t.status = 'completed';
    t.completedAt = new Date().toISOString();
  } else {
    t.status = 'open';
    t.completedAt = null;
  }
  await saveTickets(tickets);
  renderAll();
}

async function changePriority(id, priority) {
  const tickets = await getTickets();
  const t = tickets.find(x => x.id === id);
  if (!t) return;
  t.priority = priority;
  await saveTickets(tickets);
  renderAll();
}

async function deleteTicket(id) {
  const tickets = (await getTickets()).filter(x => x.id !== id);
  await saveTickets(tickets);
  renderAll();
}

async function reorder(srcId, targetId) {
  const tickets = await getTickets();
  const src    = tickets.find(t => t.id === srcId);
  const target = tickets.find(t => t.id === targetId);
  if (!src || !target) return;

  const tmp    = src.order;
  src.order    = target.order;
  target.order = tmp;

  tickets.sort((a, b) => (a.order || 0) - (b.order || 0));
  await saveTickets(tickets);
  renderAll();
}

// Sort buttons
document.getElementById('sortPriorityBtn').addEventListener('click', async () => {
  const tickets = await getTickets();
  tickets.sort((a, b) => (PRIORITY_ORDER[a.priority] ?? 4) - (PRIORITY_ORDER[b.priority] ?? 4));
  tickets.forEach((t, i) => t.order = i * 1000);
  await saveTickets(tickets);
  renderAll();
});

document.getElementById('sortDateBtn').addEventListener('click', async () => {
  const tickets = await getTickets();
  tickets.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  tickets.forEach((t, i) => t.order = i * 1000);
  await saveTickets(tickets);
  renderAll();
});

document.getElementById('clearCompletedBtn').addEventListener('click', async () => {
  if (!confirm('Remove all completed tickets?')) return;
  const tickets = (await getTickets()).filter(t => t.status !== 'completed');
  await saveTickets(tickets);
  renderAll();
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderList(getTickets());
  });
});

// ── UTILS ─────────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── LOGO CANVAS (remove white bg) ────────────────────────────
function stripWhite(imgId, canvasId) {
  var img = document.getElementById(imgId);
  var canvas = document.getElementById(canvasId);
  if (!img || !canvas) return;
  canvas.width  = img.naturalWidth  || 166;
  canvas.height = img.naturalHeight || 154;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  var id = ctx.getImageData(0, 0, canvas.width, canvas.height);
  var d = id.data;
  for (var i = 0; i < d.length; i += 4) {
    if (d[i]>220 && d[i+1]>220 && d[i+2]>220) d[i+3] = 0;
  }
  ctx.putImageData(id, 0, 0);
}

window.addEventListener('load', () => {
  stripWhite('loginLogo383raw',  'loginLogo383canvas');
  stripWhite('tbLogo383raw',     'tbLogo383canvas');
  if (isLoggedIn()) renderAll();
});
</script>
